<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Schedule a Consultation | Fitness By Ken</title>
    <meta name="description" content="Schedule a free consultation with Fitness By Ken to discuss personal training, online coaching, nutrition, or HYROX goals." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="js/login.js"></script>
  </head>
  <body>
    <!-- HEADER / NAV -->
    <header class="header">
      <div class="container nav">
        <a href="index.html" class="logo">Fitness By Ken</a>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
          <a href="login.html" class="login-link loginHidden">Login</a>
        </div>
      </div>

      <div class="container nav mobile-nav">
        <a href="index.html" class="logo">Fitness By Ken</a>

        <div class="mobile-right">
          <a href="login.html" class="login-link loginHidden">Login</a>
          <button
            class="hamburger"
            id="hamburger"
            type="button"
            aria-label="Open navigation menu"
            aria-controls="navLinksMobile"
            aria-expanded="false"
          >
            ☰
          </button>
        </div>
        <div class="nav-links" id="navLinksMobile">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
        </div>
      </div>
    </header>
    <section class="section">
      <div class="container">
        <h1>Schedule a FREE Consultation</h1>

        <iframe
          src="https://calendly.com/ken-fitnessbyken/30min"
          width="100%"
          height="700"
          frameborder="0"
        >
        </iframe>
      </div>
    </section>
    <!--[if lt IE 7]>
      <p class="browsehappy">

        <a href="#">upgrade your browser</a> to improve your experience.
      </p>
    <![endif]-->

    <script src="" async defer></script>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="container">
        <nav class="footer-links" aria-label="Footer links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="terms.html">Terms & Conditions</a>
        </nav>
        <p>© 2026 Fitness By Ken LLC. All rights reserved.</p>
      </div>
    </footer>
    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinksMobile");
      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
        const isOpen = navLinks.classList.contains("active");
        hamburger.setAttribute("aria-expanded", isOpen);
        hamburger.setAttribute(
          "aria-label",
          isOpen ? "Close navigation menu" : "Open navigation menu",
        );
      });
    </script>
  </body>
</html>
