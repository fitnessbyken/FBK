<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create Account | Fitness By Ken</title>
    <meta name="description" content="Create a Fitness By Ken client account for coaching access and support." />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- HEADER / NAV -->
    <header class="header">
      <div class="container nav">
        <a href="index.html" class="logo">Fitness By Ken</a>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
          <a href="login.html" class="login-link loginHidden">Login</a>
        </div>
      </div>

      <div class="container nav mobile-nav">
        <a href="index.html" class="logo">Fitness By Ken</a>

        <div class="mobile-right">
          <a href="login.html" class="login-link loginHidden">Login</a>
          <button
            class="hamburger"
            id="hamburger"
            type="button"
            aria-label="Open navigation menu"
            aria-controls="navLinksMobile"
            aria-expanded="false"
          >
            ☰
          </button>
        </div>
        <div class="nav-links" id="navLinksMobile">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
        </div>
      </div>
    </header>
    <section class="auth-section">
      <div class="auth-card">
        <h1>Create Account</h1>

        <form id="signup-form">
          <input type="email" id="email" placeholder="Email" aria-label="Email address" required />

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

          <button type="submit" class="btn primary">Create Account</button>
        </form>

        <p id="message"></p>

        <p>
          Already have an account?
          <a href="login.html" class="link">Login here</a>
        </p>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <nav class="footer-links" aria-label="Footer links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="terms.html">Terms & Conditions</a>
        </nav>
        <p>© 2026 Fitness By Ken LLC. All rights reserved.</p>
      </div>
    </footer>

    <script type="module" src="js/signup.js"></script>
    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinksMobile");
      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
        const isOpen = navLinks.classList.contains("active");
        hamburger.setAttribute("aria-expanded", isOpen);
        hamburger.setAttribute(
          "aria-label",
          isOpen ? "Close navigation menu" : "Open navigation menu",
        );
      });
    </script>
  </body>
</html>
