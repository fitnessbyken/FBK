<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="images/favicon-64.png" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
    <meta property="og:site_name" content="Fitness By Ken" />
    <meta property="og:title" content="Fitness By Ken" />
    <meta property="og:description" content="Personal training, online coaching, nutrition coaching, and HYROX training built around accountability and sustainable results." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://fitnessbyken.com/images/social-preview.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fitness By Ken" />
    <meta name="twitter:description" content="Personal training, online coaching, nutrition coaching, and HYROX training built around accountability and sustainable results." />
    <meta name="twitter:image" content="https://fitnessbyken.com/images/social-preview.png" />
    <title>Client Login | Fitness By Ken</title>
    <meta name="description" content="Client login for Fitness By Ken coaching resources and account access." />
    <script type="module" src="js/login.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER / NAV -->
    <header class="header">
      <div class="container nav">
        <a href="index.html" class="logo">Fitness By Ken</a>
        <div class="nav-links" id="navLinks">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
          <a href="login.html" class="login-link loginHidden">Login</a>
        </div>
      </div>

      <div class="container nav mobile-nav">
        <a href="index.html" class="logo">Fitness By Ken</a>

        <div class="mobile-right">
          <a href="login.html" class="login-link loginHidden">Login</a>
          <button
            class="hamburger"
            id="hamburger"
            type="button"
            aria-label="Open navigation menu"
            aria-controls="navLinksMobile"
            aria-expanded="false"
          >
            ☰
          </button>
        </div>
        <div class="nav-links" id="navLinksMobile">
          <a href="index.html">Home</a>
          <a href="products.html">Coaching</a>
          <a href="supplements.html">Supplements</a>
          <a href="scheduling.html">Schedule</a>
          <a href="aboutme.html">About</a>
        </div>
      </div>
    </header>

    <section class="auth-section">
      <div class="auth-card">
        <h1>Client Login</h1>

        <form id="login-form">
          <input type="email" id="email" placeholder="Email" aria-label="Email address" required />
          <input type="password" id="password" placeholder="Password" aria-label="Password" required />

          <button type="submit" class="btn primary">Login</button>
        </form>
        <p>
          Don’t have an account?
          <a href="signup.html" class="link">Create one</a>
        </p>

        <p id="message"></p>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <nav class="footer-social-links" aria-label="Social media links">
          <a
            href="https://www.facebook.com/profile.php?id=61590606507037"
            class="footer-social-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Fitness By Ken on Facebook"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M22 12.06C22 6.5 17.52 2 12 2S2 6.5 2 12.06c0 5.02 3.66 9.19 8.44 9.94v-7.03H7.9v-2.91h2.54V9.84c0-2.52 1.49-3.91 3.77-3.91 1.09 0 2.23.2 2.23.2v2.47h-1.26c-1.24 0-1.63.78-1.63 1.57v1.89h2.78l-.44 2.91h-2.34V22C18.34 21.25 22 17.08 22 12.06Z" />
            </svg>
            <span class="sr-only">Facebook</span>
          </a>
          <a
            href="https://www.instagram.com/kenneth_personal_trainer?igsh=eWFkMnViYml3bGts&utm_source=qr"
            class="footer-social-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Fitness By Ken on Instagram"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5Zm8.75 2.25a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z" />
            </svg>
            <span class="sr-only">Instagram</span>
          </a>
        </nav>
        <nav class="footer-links" aria-label="Legal links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="terms.html">Terms & Conditions</a>
        </nav>
        <p>© 2026 Fitness By Ken LLC. All rights reserved.</p>
      </div>
    </footer>

    <script type="module" src="js/login.js"></script>
    <script>
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinksMobile");
      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("active");
        const isOpen = navLinks.classList.contains("active");
        hamburger.setAttribute("aria-expanded", isOpen);
        hamburger.setAttribute(
          "aria-label",
          isOpen ? "Close navigation menu" : "Open navigation menu",
        );
      });
    </script>
  </body>
</html>
